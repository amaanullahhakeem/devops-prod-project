name: writting CI for node-app

on:
  push:
    branches: 
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run test for node-app
      run: node node.js

    - name: Build image for node-app
      run: docker build -t {{ secrets.DOCKER_USERNAME }}/node-app:v1

    - name: Run docker images
      run: docker run -d -p 3000:3000 {{secret.DOCKER_USERNAME}}/node-app:v1

    - name: Docker LogIn
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
    
    - name: Push image to docker hub
      run: docker push {{ secrets.DOCKER_USERNAME }}/node-app:v1
